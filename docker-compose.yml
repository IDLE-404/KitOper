version: '3.9'

services:
  db:
    image: mysql:8.0
    container_name: DataBase
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: laravel
      MYSQL_DATABASE: KitOper
      MYSQL_USER: laravel
      MYSQL_PASSWORD: laravel
    volumes:
      - db-data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password
    networks:
      - kitOper

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: phpmyadmin
    environment:
      PMA_HOST: db
      PMA_USER: root
      PMA_PASSWORD: laravel

    ports:
      - "8081:80"
    depends_on:
      - db
    networks:
      - kitOper

  backend:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: it-backend
    restart: always
    volumes:
      - .:/var/www
    environment:
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: KitOper
      DB_USERNAME: laravel
      DB_PASSWORD: laravel
    depends_on:
      - db
    networks:
      - kitOper


  webserver:
    image: nginx:1.25-alpine
    container_name: it-webserver
    restart: always
    ports:
      - "8000:80"
    volumes:
      - .:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - backend
    networks:
      - kitOper

volumes:
  db-data:

networks:
  kitOper:
    driver: bridge
    ipam:
      config:
        - subnet: 10.10.0.0/16
          gateway: 10.10.0.1
