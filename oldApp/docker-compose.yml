services:
  db:
    image: mysql:8.0
    container_name: DataBase
    ports:
      - "127.0.0.1:3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - db-data:/var/lib/mysql
    # mysql_native_password убран — в MySQL 8.2+ его нет, оставляем дефолт caching_sha2_password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u${DB_USERNAME}", "-p${DB_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - kitOper

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: phpmyadmin
    environment:
      PMA_HOST: db
      PMA_ABSOLUTE_URI: https://schedule.pbk.kz/phpmyadmin/
    ports:
      - "127.0.0.1:8081:80"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - kitOper

  redis:
    image: redis:7-alpine
    container_name: it-redis
    restart: always
    ports:
      - "127.0.0.1:6379:6379"
    # appendonly — данные переживают рестарт контейнера
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - kitOper

  ollama:
    image: ollama/ollama
    container_name: it-ollama
    restart: always
    ports:
      - "127.0.0.1:11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    # Ограничиваем память — модели на CPU могут съесть всё что есть
    mem_limit: 6g
    networks:
      - kitOper

  backend:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: it-backend
    restart: always
    volumes:
      - .:/var/www
    environment:
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: ${DB_DATABASE}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      OLLAMA_HOST: http://ollama:11434
      REDIS_HOST: redis
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      ollama:
        condition: service_started
    networks:
      - kitOper

  webserver:
    image: nginx:1.25-alpine
    container_name: it-webserver
    restart: always
    ports:
      - "127.0.0.1:8000:80"
    volumes:
      - .:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - backend
    networks:
      - kitOper

volumes:
  db-data:
  redis-data:
  ollama-data:

networks:
  kitOper:
    name: kitoper_kitOper
    external: true
