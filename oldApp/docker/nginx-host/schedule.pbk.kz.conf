# Конфиг ХОСТОВОГО nginx (не докер-контейнера) для schedule.pbk.kz.
# Кладётся на сервере в /etc/nginx/sites-available/schedule.pbk.kz и
# симлинкается в sites-enabled. SSL-часть дописана certbot --nginx
# (сертификат от Let's Encrypt, автопродление настроено certbot-таймером).
# Если будешь переносить этот файл на новый сервер - сертификата ещё не
# будет, нужно сначала закомментировать/убрать блок listen 443 ssl и
# заново прогнать certbot --nginx -d schedule.pbk.kz.

server {
    server_name schedule.pbk.kz;

    client_max_body_size 34M;

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /phpmyadmin/ {
        proxy_pass http://127.0.0.1:8081/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/schedule.pbk.kz/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/schedule.pbk.kz/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
}

server {
    if ($host = schedule.pbk.kz) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    listen 80;
    server_name schedule.pbk.kz;
    return 404; # managed by Certbot
}
