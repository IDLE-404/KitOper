# Конфиг ХОСТОВОГО nginx (не докер-контейнера) для schedule.pbk.kz.
# Кладётся на сервере в /etc/nginx/sites-available/schedule.pbk.kz и
# симлинкается в sites-enabled. SSL пока не настроен - после успешного
# certbot --nginx сюда нужно будет вписать реальную версию с сервера
# (certbot сам допишет ssl_certificate и редирект).

server {
    listen 80;
    server_name schedule.pbk.kz;

    client_max_body_size 34M;

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /phpmyadmin/ {
        proxy_pass http://127.0.0.1:8081/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
