# Конфиг ХОСТОВОГО nginx (не докер-контейнера) для schedule.pbk.kz.
# Кладётся на сервере в /etc/nginx/sites-available/schedule.pbk.kz и
# симлинкается в sites-enabled. SSL-блок сгенерирован certbot --nginx,
# при повторном запуске certbot пути к сертификату могут обновиться сами.

server {
    listen 80;
    server_name schedule.pbk.kz;

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name schedule.pbk.kz;

    client_max_body_size 34M;

    ssl_certificate /etc/letsencrypt/live/schedule.pbk.kz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/schedule.pbk.kz/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparam.pem;

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /phpmyadmin/ {
        proxy_pass http://127.0.0.1:8081/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
